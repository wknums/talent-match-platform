name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/terraform/**"
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"

permissions:
  id-token: write   # OIDC
  contents: read
  pull-requests: write

env:
  ARM_USE_OIDC: true
  TF_VERSION: "1.6.6"

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, test]
    environment: ${{ matrix.env }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infra/terraform/envs/${{ matrix.env }}
        run: terraform init

      - name: Terraform Validate
        working-directory: infra/terraform/envs/${{ matrix.env }}
        run: terraform validate

      - name: Terraform Format Check
        working-directory: infra/terraform/envs/${{ matrix.env }}
        run: terraform fmt -check -recursive

      - name: Terraform Plan
        id: plan
        working-directory: infra/terraform/envs/${{ matrix.env }}
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -out=tfplan-${{ matrix.env }} \
            -no-color 2>&1 | tee plan-output.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.env }}
          path: infra/terraform/envs/${{ matrix.env }}/tfplan-${{ matrix.env }}

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(
              'infra/terraform/envs/${{ matrix.env }}/plan-output.txt', 'utf8'
            );
            const body = `### Terraform Plan – \`${{ matrix.env }}\`\n\`\`\`\n${plan.slice(-3000)}\n\`\`\``;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
