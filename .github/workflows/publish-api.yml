name: Publish API Container

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "db/**"
      - "runtime/**"
      - "Dockerfile"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  id-token: write
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/awr-platform-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deploy to App Service for Containers (default)
      - name: Deploy to App Service
        if: vars.HOST_CHOICE == 'webapp_container' || vars.HOST_CHOICE == ''
        run: |
          az webapp config container set \
            --name "app-awr-${{ github.event.inputs.environment || 'dev' }}" \
            --resource-group "rg-awr-${{ github.event.inputs.environment || 'dev' }}" \
            --container-image-name "${{ needs.build-and-push.outputs.image_tag }}"

      # Deploy to Container Apps (if chosen)
      - name: Deploy to Container Apps
        if: vars.HOST_CHOICE == 'container_apps'
        run: |
          az containerapp update \
            --name "ca-awr-api-${{ github.event.inputs.environment || 'dev' }}" \
            --resource-group "rg-awr-${{ github.event.inputs.environment || 'dev' }}" \
            --image "${{ needs.build-and-push.outputs.image_tag }}"
